<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>星空メッセージAR (時間連動デバッグ版)</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        #debug-time-ui {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .debug-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #ccc;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 12px;
        }

        .debug-btn:hover {
            background: white;
        }
    </style>
</head>

<body>

    <div id="debug-time-ui">
        <button class="debug-btn" onclick="setDebugTime(6)">朝 (6h)</button>
        <button class="debug-btn" onclick="setDebugTime(12)">昼 (12h)</button>
        <button class="debug-btn" onclick="setDebugTime(17)">夕方 (17h)</button>
        <button class="debug-btn" onclick="setDebugTime(21)">夜 (21h)</button>
        <button class="debug-btn" onclick="resetTime()">自動（現実）</button>
    </div>

    <div id="dark-overlay"></div>

    <div id="message-ui">
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse"
        raycaster="objects: .clickable" vr-mode-ui="enabled: false">
        <a-camera></a-camera>
    </a-scene>

    <script type="module" src="main.js"></script>
</body>

</html>
