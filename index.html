<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>コテージキャンバス</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== チェックイン画面 ========== -->
  <div id="screen-checkin" class="screen">
    <div class="drawing-bg" id="drawing-bg-checkin"></div>
    <header class="app-header">
      <h1 class="app-title">🏕 コテージキャンバス</h1>
      <p class="app-cottage">コテージ No. <span class="cottage-id">--</span></p>
    </header>

    <main class="container">

      <section class="section">
        <h2 class="section-title">前の旅人からのメッセージ</h2>
        <div id="message-list"></div>
      </section>

      <!-- チェックイン前 -->
      <section class="section" id="checkin-form">
        <h2 class="section-title">チェックイン</h2>
        <p id="visit-greeting" class="visit-greeting"></p>
        <div class="form-group">
          <label for="guest-name" class="form-label">お名前（任意）</label>
          <input id="guest-name" type="text" class="form-input" placeholder="旅人" maxlength="50" />
        </div>
        <p id="checkin-error" class="error-text"></p>
        <button id="checkin-btn" class="btn btn--primary btn--full">チェックインする</button>
      </section>

      <!-- チェックイン後 -->
      <section class="section" id="after-checkin" hidden>
        <p class="welcome-message">ようこそ！ゆっくりお過ごしください。</p>
        <div class="action-buttons">
          <a href="./town/" class="btn btn--secondary">🗺 地図を見る</a>
          <a href="./star/" class="btn btn--secondary">✨ 星空を見る</a>
        </div>
        <button id="go-history-btn" class="btn btn--outline btn--full">📖 自分の過去の投稿を見る</button>
        <button id="go-checkout-btn" class="btn btn--outline btn--full">チェックアウトへ →</button>
      </section>

    </main>
  </div>


  <!-- ========== 過去の投稿画面 ========== -->
  <div id="screen-history" class="screen" hidden>
    <header class="app-header">
      <h1 class="app-title">🏕 コテージキャンバス</h1>
      <p class="app-cottage">コテージ No. <span class="cottage-id">--</span></p>
    </header>

    <main class="container">
      <section class="section">
        <h2 class="section-title">自分の過去の投稿</h2>
        <div id="my-message-list"></div>
      </section>
      <button id="back-from-history-btn" class="btn btn--outline btn--full">← 戻る</button>
    </main>
  </div>


  <!-- ========== チェックアウト画面 ========== -->
  <div id="screen-checkout" class="screen" hidden>
    <div class="drawing-bg" id="drawing-bg-checkout"></div>
    <header class="app-header">
      <h1 class="app-title">🏕 コテージキャンバス</h1>
      <p class="app-cottage">コテージ No. <span class="cottage-id">--</span></p>
    </header>

    <main class="container">
      <!-- 絵を描くセクション -->
      <section class="section">
        <h2 class="section-title">絵を描いて残す</h2>
        <div class="form-group">
          <label for="author-name" class="form-label">お名前（任意）</label>
          <input id="author-name" type="text" class="form-input" placeholder="旅人" maxlength="50" />
        </div>
        <div class="canvas-toolbar">
          <div class="color-palette">
            <button class="color-btn active" data-color="#222222" style="background:#222222" aria-label="黒"></button>
            <button class="color-btn" data-color="#e03333" style="background:#e03333" aria-label="赤"></button>
            <button class="color-btn" data-color="#3366cc" style="background:#3366cc" aria-label="青"></button>
            <button class="color-btn" data-color="#2e8b57" style="background:#2e8b57" aria-label="緑"></button>
            <button class="color-btn" data-color="#e87c1e" style="background:#e87c1e" aria-label="オレンジ"></button>
          </div>
          <button id="canvas-clear-btn" class="btn btn--outline">消す</button>
        </div>
        <canvas id="drawing-canvas"></canvas>
        <p id="drawing-error" class="error-text"></p>
        <button id="drawing-post-btn" class="btn btn--primary btn--full">この絵を残してチェックアウト</button>
        <button id="skip-drawing-btn" class="btn btn--outline btn--full" style="margin-top:0.5rem">絵なしでチェックアウト</button>
      </section>

      <!-- 過去の絵ギャラリー -->
      <section class="section">
        <h2 class="section-title">前の旅人の絵</h2>
        <div id="drawing-gallery"></div>
      </section>
    </main>
  </div>


  <!-- ========== 完了画面 ========== -->
  <div id="screen-done" class="screen" hidden>
    <div class="completion">
      <div class="completion__icon">🌿</div>
      <h1 class="completion__title">思い出を残しました</h1>
      <p class="completion__message">
        あなたのメッセージが<br>次の旅人に届きます。<br>またいつか、ここで。
      </p>
      <button id="restart-btn" class="btn btn--primary">最初に戻る</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
